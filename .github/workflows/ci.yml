name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-ml.txt
      - name: Compile Python files
        run: python -m compileall -q main.py scripts src
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Run scoring benchmark
        run: python scripts/evaluate_scoring.py
      - name: Run anonymous semantic-evidence validation
        run: python scripts/ml/evaluate_real_validation.py --semantic-only
      - name: Run privacy audit
        run: python scripts/privacy_audit.py
