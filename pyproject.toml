[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402"]
"scripts/ml/*.py" = ["E402"]
"src/analyze_job.py" = ["F401"]
"src/dashboard.py" = ["F401"]
"tests/*.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
files = [
  "src/scoring_types.py",
  "src/scoring_config.py",
  "src/scoring_eligibility.py",
  "src/scoring_engine.py",
  "src/scoring_extraction.py",
  "src/scoring_matching.py",
  "src/scoring_report.py",
  "src/jd_enrichment.py",
  "src/generate_cover_letter.py",
  "src/manual_jobs.py",
  "src/tracker.py",
  "src/dashboard_fit.py",
  "src/dashboard_review.py",
  "src/dashboard_regions.py",
  "src/dashboard_manual.py",
  "src/dashboard_fetch.py",
  "src/dashboard_tracker.py",
  "src/ml",
  "scripts/ml",
]
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
pretty = true
disable_error_code = ["import-untyped"]

[tool.coverage.run]
relative_files = true

[tool.coverage.report]
precision = 1
show_missing = true
skip_covered = true
exclude_also = [
  "if __name__ == .__main__.:",
  "if TYPE_CHECKING:",
]
